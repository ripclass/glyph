# Supabase CLI v2 config format (the original [project]/id form was CLI v1)
project_id = "glyph"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
# Matches the cloud project (pywgimmcbzwnwcvnvmay runs Postgres 17).
# Changing this forces a local image re-pull + db reset on next `supabase start`.
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]

# Phone/OTP auth (CLI v2: [auth.sms]; [auth.external.*] is OAuth-only)
[auth.sms]
enable_signup = true
enable_confirmations = false

[storage]
enabled = true
file_size_limit = "50MiB"

[realtime]
enabled = true

# Edge functions deployed with JWT verification OFF — they authenticate on a shared
# secret (triage: TRIAGE_SHARED_SECRET; lens-normalize: LENS_SHARED_SECRET) or a bridge
# secret (extract-document: WHATSAPP_BRIDGE_SECRET), NOT a Supabase JWT. Pinned here so a
# blanket `supabase functions deploy` preserves it — previously only a deploy-time
# `--no-verify-jwt` flag, which a flagless redeploy would silently reset to verify_jwt=true.
[functions.triage]
verify_jwt = false

[functions.extract-document]
verify_jwt = false

[functions.lens-normalize]
verify_jwt = false
