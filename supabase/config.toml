# Supabase CLI v2 config format (the original [project]/id form was CLI v1)
project_id = "glyph"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
# Matches the cloud project (pywgimmcbzwnwcvnvmay runs Postgres 17).
# Changing this forces a local image re-pull + db reset on next `supabase start`.
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]

# Phone/OTP auth (CLI v2: [auth.sms]; [auth.external.*] is OAuth-only)
[auth.sms]
enable_signup = true
enable_confirmations = false

[storage]
enabled = true
file_size_limit = "50MiB"

[realtime]
enabled = true
